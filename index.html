<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Prioritization — Comp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #F5F5F5;
      --card:         #FFFFFF;
      --border:       #E8E8E8;
      --text:         #111111;
      --muted:        #888888;
      --accent:       #F4364C;
      --accent-dark:  #C92236;
      --accent-light: #FFF0F1;
      --green:        #16a34a;
      --green-light:  #f0fdf4;
      --yellow:       #ca8a04;
      --yellow-light: #fefce8;
      --blue:         #2563eb;
      --blue-light:   #eff6ff;
      --orange:       #ea580c;
      --orange-light: #fff7ed;
      --purple:       #7c3aed;
      --purple-light: #f5f3ff;
      --indigo:       #4338ca;
      --indigo-light: #eef2ff;
      --amber:        #d97706;
      --amber-light:  #fffbeb;
      --radius:       10px;
      --shadow:       0 1px 4px rgba(0,0,0,0.07);
      --shadow-md:    0 4px 16px rgba(0,0,0,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      background: var(--accent); padding: 0 32px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
      position: sticky; top: 0; z-index: 100; height: 56px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    header h1 { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.01em; }
    .header-divider { width: 1px; height: 18px; background: rgba(255,255,255,0.3); }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.7); }
    .header-right { font-size: 11px; color: rgba(255,255,255,0.6); }

    /* ── Main ── */
    main { padding: 28px 32px; max-width: 1280px; margin: 0 auto; }

    /* ── Section header ── */
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .section-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; }
    .section-sub   { font-size:12px; color:var(--muted); margin-top:2px; }

    /* ── Table ── */
    .table-wrap {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); overflow-x:auto; box-shadow:var(--shadow); margin-bottom:32px;
    }
    table { width:100%; border-collapse:collapse; min-width:860px; }
    thead th {
      padding:11px 14px; text-align:left; font-size:10px;
      text-transform:uppercase; letter-spacing:0.07em;
      color:var(--muted); border-bottom:1px solid var(--border);
      white-space:nowrap; background:var(--card); font-weight:600;
    }
    thead th.center { text-align:center; }
    tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; cursor:pointer; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:#fafafa; }
    tbody tr.disqualified { opacity:0.55; }
    tbody tr.active-row { background:var(--accent-light) !important; }
    tbody td { padding:12px 14px; font-size:13px; vertical-align:middle; }
    tbody td.center { text-align:center; }
    .rank { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; font-size:11px; font-weight:700; color:var(--muted); background:#f3f4f6; }
    .rank.top { background:var(--accent-light); color:var(--accent); }
    .company-name { font-weight:600; }
    .company-name a { color:var(--text); text-decoration:none; }
    .company-name a:hover { color:var(--accent); text-decoration:underline; }
    .company-meta { font-size:11px; color:var(--muted); margin-top:2px; }
    .score-wrap { display:flex; align-items:center; gap:8px; }
    .score-num { font-weight:700; font-size:13px; width:26px; text-align:right; flex-shrink:0; }
    .score-bar-bg { flex:1; height:6px; background:var(--border); border-radius:99px; overflow:hidden; min-width:60px; }
    .score-bar-fill { height:100%; border-radius:99px; }
    .fill-red { background:var(--accent); }
    .fill-yellow { background:var(--yellow); }
    .fill-muted { background:#ccc; }
    .badge { display:inline-block; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
    .badge-red    { background:var(--accent-light); color:var(--accent); }
    .badge-yellow { background:var(--yellow-light); color:var(--yellow); }
    .badge-muted  { background:#f3f4f6; color:var(--muted); }
    .badge-green  { background:var(--green-light);  color:var(--green); }
    .growth-pos { color:var(--green); font-weight:600; }
    .growth-neg { color:var(--accent); font-weight:600; }
    .growth-neu { color:var(--muted); font-weight:600; }
    .disq-reason { font-size:11px; color:var(--muted); font-style:italic; }
    /* ── Sortable headers ── */
    .th-sort { cursor:pointer; user-select:none; }
    .th-sort:hover { color:var(--text); }
    .th-sort::after { content:''; margin-left:3px; opacity:0.25; font-size:9px; }
    .th-sort.asc::after  { content:'↑'; opacity:1; color:var(--accent); }
    .th-sort.desc::after { content:'↓'; opacity:1; color:var(--accent); }
    /* ── Last Interaction cell ── */
    .ix-date   { font-size:12px; font-weight:600; color:var(--text); }
    .ix-person { font-size:11px; color:var(--muted); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }

    /* ── Footer ── */
    footer { margin-top:8px; text-align:center; font-size:11px; color:var(--muted); padding-bottom:32px; }

    /* ── Spinner ── */
    .spinner-sm { display:inline-block; width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:5px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ════════════════════════════════════════════════════════
       MAPA DE CONTAS — Full-screen overlay
    ════════════════════════════════════════════════════════ */
    .mapa-overlay {
      display:none; position:fixed; inset:0; top:56px;
      z-index:200; flex-direction:row; overflow:hidden;
    }
    .mapa-overlay.open { display:flex; }

    /* ── Canvas ── */
    .mapa-canvas {
      flex:1; position:relative; overflow:hidden;
      background-color:#F8F9FB;
      background-image:radial-gradient(#D1D5DB 1.2px, transparent 1.2px);
      background-size:24px 24px;
      cursor:grab;
    }
    .mapa-canvas.dragging { cursor:grabbing; }

    .mapa-topbar {
      position:absolute; top:0; left:0; right:0; height:46px;
      background:rgba(248,249,251,0.93); backdrop-filter:blur(6px);
      border-bottom:1px solid #E5E7EB;
      display:flex; align-items:center; padding:0 20px; gap:14px;
      z-index:15; pointer-events:all;
    }
    .mapa-back-btn {
      display:flex; align-items:center; gap:6px;
      font-size:12px; font-weight:600; color:var(--muted);
      background:none; border:none; cursor:pointer;
      padding:4px 8px; border-radius:6px; font-family:inherit;
      transition:background 0.15s, color 0.15s;
    }
    .mapa-back-btn:hover { background:#ECEEF0; color:var(--text); }
    .topbar-sep { width:1px; height:16px; background:var(--border); }
    .topbar-name { font-size:13px; font-weight:700; }
    .topbar-seg  { font-size:12px; color:var(--muted); }

    /* Viewport (receives wheel + drag events) */
    .mapa-viewport {
      position:absolute; top:46px; left:0; right:0; bottom:0;
      overflow:hidden;
    }
    /* Transformable inner (contains nodes + SVG) */
    #mapa-inner {
      position:absolute; top:0; left:0;
      transform-origin:0 0;
      will-change:transform;
    }
    #mapa-svg {
      position:absolute; top:0; left:0;
      pointer-events:none; overflow:visible;
    }

    /* Canvas loading/empty state */
    .canvas-state {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      text-align:center; color:var(--muted); font-size:13px;
      pointer-events:none; z-index:5;
    }

    /* Zoom controls (bottom-left of canvas) */
    .zoom-btns {
      position:absolute; bottom:20px; left:20px;
      display:flex; flex-direction:column; gap:2px; z-index:15;
    }
    .zoom-btn {
      width:28px; height:28px;
      background:white; border:1px solid #E5E7EB; border-radius:6px;
      cursor:pointer; font-size:15px; font-weight:600;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 1px 4px rgba(0,0,0,0.08);
      font-family:inherit; color:#374151;
      transition:background 0.15s; line-height:1;
      padding:0;
    }
    .zoom-btn:hover { background:#F3F4F6; }
    .zoom-btn.fit-btn { font-size:10px; letter-spacing:-0.03em; font-weight:700; }

    /* ── Company node ── */
    .org-co-node {
      position:absolute; transform:translateX(-50%);
      background:var(--card); border:1px solid var(--border);
      border-left:4px solid var(--accent); border-radius:12px;
      padding:12px 20px; box-shadow:var(--shadow-md); min-width:220px;
      text-align:center;
    }
    .org-co-name  { font-size:15px; font-weight:700; }
    .org-co-meta  { font-size:10px; color:var(--muted); margin-top:3px; }
    .org-co-badges { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
    .org-co-badge  { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:600; }
    .co-badge-score { background:var(--accent-light); color:var(--accent); }
    .co-badge-fte   { background:#F3F4F6; color:var(--muted); }
    .co-badge-li    { background:var(--blue-light); color:var(--blue); cursor:pointer; }
    .co-badge-li:hover { text-decoration:underline; }

    /* ── Person node ── */
    .org-person-node {
      position:absolute; transform:translateX(-50%);
      background:var(--card); border:1px solid var(--border);
      border-radius:10px; padding:10px 12px;
      box-shadow:var(--shadow); width:172px;
    }
    .org-pname-row { display:flex; align-items:center; gap:5px; }
    .org-pname  { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
    .org-pli    { font-size:11px; color:var(--blue); text-decoration:none; flex-shrink:0; line-height:1; }
    .org-pli:hover { color:var(--accent); }
    .org-ptitle { font-size:10px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .org-prole  { display:inline-block; margin-top:5px; padding:2px 7px; border-radius:4px; font-size:9px; font-weight:700; }
    .role-d { background:var(--accent-light); color:var(--accent); }
    .role-i { background:var(--yellow-light); color:var(--yellow); }
    .role-u { background:#F3F4F6; color:var(--muted); }
    .org-pdate { margin-top:4px; font-size:9px; color:var(--purple); }

    /* ── Right panel ── */
    .mapa-panel {
      width:384px; flex-shrink:0;
      background:#fff; border-left:1px solid #E5E7EB;
      display:flex; flex-direction:column; overflow:hidden;
    }
    .panel-hdr {
      padding:16px 20px 0; border-bottom:1px solid #F3F4F6; flex-shrink:0;
    }
    .panel-hdr-row { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:10px; }
    .panel-co-name { font-size:14px; font-weight:700; line-height:1.3; }
    .panel-co-seg  { font-size:11px; color:var(--muted); margin-top:2px; }
    .panel-close-btn {
      background:none; border:none; cursor:pointer; color:var(--muted);
      font-size:16px; padding:2px 6px; border-radius:4px;
      font-family:inherit; transition:background 0.15s; flex-shrink:0;
    }
    .panel-close-btn:hover { background:#F3F4F6; color:var(--text); }
    .panel-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
    .pb { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:600; white-space:nowrap; }
    .pb-score  { background:var(--accent-light); color:var(--accent); }
    .pb-high   { background:var(--accent-light); color:var(--accent); }
    .pb-mid    { background:var(--yellow-light); color:var(--yellow); }
    .pb-low    { background:#F3F4F6; color:var(--muted); }
    .pb-none   { background:#F3F4F6; color:#aaa; }
    .pb-fte    { background:#F3F4F6; color:var(--muted); }
    .pb-gpos   { background:var(--green-light); color:var(--green); }
    .pb-gneg   { background:var(--accent-light); color:var(--accent); }
    .panel-links { display:flex; gap:12px; margin-bottom:14px; }
    .panel-link { display:inline-flex; align-items:center; gap:3px; font-size:11px; color:var(--blue); text-decoration:none; font-weight:500; }
    .panel-link:hover { text-decoration:underline; }

    /* Tabs */
    .panel-tabs { display:flex; gap:1px; }
    .panel-tab {
      flex:1; padding:8px 0; font-size:11px; font-weight:600; text-align:center;
      border:none; background:none; cursor:pointer; font-family:inherit;
      color:var(--muted); border-bottom:2px solid transparent;
      transition:color 0.15s, border-color 0.15s;
    }
    .panel-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .panel-tab:hover:not(.active) { color:var(--text); }

    /* Panel body */
    .panel-body { flex:1; overflow-y:auto; padding:16px 20px; }
    .panel-section { margin-bottom:20px; }
    .psection-title {
      font-size:10px; font-weight:700; text-transform:uppercase;
      letter-spacing:0.09em; color:var(--muted); margin-bottom:10px;
      display:flex; align-items:center; gap:5px;
    }
    .psection-empty { font-size:12px; color:var(--muted); font-style:italic; }
    .panel-loading  { font-size:12px; color:var(--muted); padding:8px 0; }

    /* Score breakdown */
    .score-breakdown { display:flex; flex-direction:column; gap:9px; }
    .score-row { display:flex; align-items:center; gap:8px; }
    .score-row-label { font-size:11px; color:var(--muted); width:110px; flex-shrink:0; }
    .score-row-bar-bg { flex:1; height:5px; background:var(--border); border-radius:99px; overflow:hidden; }
    .score-row-bar-fill { height:100%; border-radius:99px; background:var(--accent); }
    .score-row-val { font-size:11px; font-weight:600; width:38px; text-align:right; flex-shrink:0; }

    /* Deal cards */
    .deal-card { border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:8px; }
    .deal-card.won  { border-color:#bbf7d0; background:#f0fdf4; }
    .deal-card.lost { border-color:#fecaca; background:#fef2f2; }
    .deal-card-row  { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px; }
    .deal-name  { font-size:12px; font-weight:600; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .deal-stage { display:inline-block; padding:2px 7px; border-radius:4px; font-size:9px; font-weight:700; white-space:nowrap; }
    .deal-stage-active { background:var(--indigo-light); color:var(--indigo); }
    .deal-stage-won    { background:#dcfce7; color:#15803d; }
    .deal-stage-lost   { background:#fee2e2; color:#b91c1c; }
    .deal-dates { display:flex; flex-wrap:wrap; gap-x:10px; gap:4px; font-size:10px; color:var(--muted); }
    .deal-dates .dl { display:inline-flex; gap:3px; }
    .deal-dates .dl b { color:var(--text); }
    .deal-meta  { font-size:10px; color:var(--muted); margin-top:4px; display:flex; gap:8px; flex-wrap:wrap; }

    /* Pessoas */
    .pessoa-card { background:#F9FAFB; border:1px solid #F3F4F6; border-radius:10px; padding:10px 12px; margin-bottom:8px; }
    .pessoa-row  { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; }
    .pessoa-name  { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pessoa-title { font-size:10px; color:var(--muted); margin-top:2px; }
    .pessoa-li { display:inline-flex; align-items:center; font-size:10px; color:var(--blue); text-decoration:none; flex-shrink:0; }
    .pessoa-li:hover { text-decoration:underline; }
    .pessoa-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
    .ptag { display:inline-block; padding:2px 7px; border-radius:4px; font-size:9px; font-weight:700; }
    .ptag-d  { background:var(--accent-light); color:var(--accent); }
    .ptag-i  { background:var(--yellow-light); color:var(--yellow); }
    .ptag-u  { background:#F3F4F6; color:var(--muted); }
    .ptag-ob { background:var(--blue-light); color:var(--blue); }
    .ptag-en { background:var(--green-light); color:var(--green); }
    .pessoa-dates { margin-top:5px; font-size:9px; }
    .pessoa-dates .pm { color:var(--purple); }
    .pessoa-dates .pe { color:var(--orange); }

    /* Reuniões */
    .meeting-item { border-left:2px solid var(--amber-light); border-left-color:#fbbf24; padding-left:10px; margin-bottom:10px; }
    .meeting-row  { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .meeting-title { font-size:11px; font-weight:600; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meeting-date  { font-size:10px; color:var(--muted); flex-shrink:0; }
    .meeting-ppl   { font-size:10px; color:var(--muted); margin-top:2px; }
    .meeting-ppl .comp-name  { color:var(--indigo); font-weight:500; }
    .meeting-ppl .client-name { color:var(--text); }
    .meeting-dur   { font-size:9px; color:var(--muted); margin-top:1px; }

    /* Timeline */
    .timeline-wrap { position:relative; }
    .timeline-line { position:absolute; left:13px; top:0; bottom:0; width:1px; background:#E5E7EB; }
    .tl-item { display:flex; gap:10px; margin-bottom:12px; position:relative; }
    .tl-icon {
      flex-shrink:0; width:26px; height:26px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:9px; font-weight:700; z-index:1;
    }
    .tl-content { min-width:0; padding-top:3px; }
    .tl-label { font-size:11px; font-weight:600; }
    .tl-date  { font-size:10px; color:var(--muted); margin-left:6px; }
    .tl-detail { font-size:10px; color:var(--muted); margin-top:1px; }

    /* Briefing */
    .briefing-bar { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:10px 0 12px; border-bottom:1px solid #F3F4F6; margin-bottom:16px; }
    .briefing-btn {
      display:flex; align-items:center; gap:6px; padding:6px 14px;
      background:var(--indigo); color:#fff; border:none; border-radius:7px;
      font-size:11px; font-weight:700; cursor:pointer; font-family:inherit;
      transition:background 0.15s; white-space:nowrap;
    }
    .briefing-btn:hover { background:#3730a3; }
    .briefing-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .briefing-btn.refresh { background:none; color:var(--indigo); border:1px solid #c7d2fe; }
    .briefing-btn.refresh:hover { background:var(--indigo-light); }
    .briefing-ts { font-size:10px; color:var(--muted); }
    .briefing-panel { background:#F9FAFB; border:1px solid #E5E7EB; border-radius:10px; padding:14px; margin-bottom:16px; }
    .briefing-section { margin-bottom:12px; }
    .briefing-section:last-child { margin-bottom:0; }
    .briefing-section-label {
      font-size:9px; font-weight:700; text-transform:uppercase;
      letter-spacing:0.09em; color:var(--muted); margin-bottom:5px;
    }
    .briefing-text { font-size:11px; color:var(--text); line-height:1.55; white-space:pre-wrap; }
    .briefing-text strong { font-weight:700; }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════
     MAPA DE CONTAS — Full-screen overlay
════════════════════════════════════════ -->
<div class="mapa-overlay" id="mapa-overlay">

  <!-- Canvas -->
  <div class="mapa-canvas" id="mapa-canvas">

    <!-- Fixed topbar -->
    <div class="mapa-topbar">
      <button class="mapa-back-btn" onclick="closeOverlay()">← Back</button>
      <div class="topbar-sep"></div>
      <span class="topbar-name" id="topbar-name"></span>
      <span class="topbar-seg"  id="topbar-seg"></span>
    </div>

    <!-- Viewport (pan/zoom area) -->
    <div class="mapa-viewport" id="mapa-viewport">
      <div id="mapa-inner">
        <svg id="mapa-svg"></svg>
      </div>
    </div>

    <!-- Loading / empty state -->
    <div class="canvas-state" id="canvas-state" style="display:none">
      <div><span class="spinner-sm"></span></div>
      <p style="margin-top:8px">Loading account map…</p>
    </div>

    <!-- Zoom controls -->

let _sortCol = 'score';
let _sortDir = 'desc';
const _lastIx = {};  // computed from _pByCoId, never fetched independently

function tierOrder(t) {
  return { 'High':1, 'Mid':2, 'Low':3, 'Very Low':4, 'Not ICP':5 }[t] ?? 6;
}

function sortBy(col) {
  if (_sortCol === col) { _sortDir = _sortDir === 'asc' ? 'desc' : 'asc'; }
  else { _sortCol = col; _sortDir = 'desc'; }
  renderTable();
}

function renderTable() {
  const names = Object.keys(COMPANIES);
  names.sort((a, b) => {
    const ca = COMPANIES[a], cb = COMPANIES[b];
    // disqualified always at bottom regardless of sort
    if (ca.disq && !cb.disq) return 1;
    if (!ca.disq && cb.disq) return -1;
    let va, vb;
    if      (_sortCol === 'ftes')   { va = ca.ftes;               vb = cb.ftes; }
    else if (_sortCol === 'growth') { va = ca.growth ?? -999;      vb = cb.growth ?? -999; }
    else if (_sortCol === 'tier')   { va = tierOrder(ca.tier);     vb = tierOrder(cb.tier); }
    else if (_sortCol === 'last')   { va = _lastIx[a]?.date || ''; vb = _lastIx[b]?.date || ''; }
    else                            { va = ca.score ?? -1;         vb = cb.score ?? -1; }
    if (va === vb) return 0;
    return (_sortDir === 'asc' ? 1 : -1) * (va > vb ? 1 : -1);
  });

  let rank = 0;
  document.getElementById('tbl-body').innerHTML = names.map(name => {
    const c = COMPANIES[name];
    const isDisq = !!c.disq;
    if (!isDisq) rank++;
    const scoreColor = (c.score ?? 0) >= 70 ? 'var(--accent)' : (c.score ?? 0) >= 50 ? 'var(--yellow)' : 'var(--muted)';
    const fillCls    = (c.score ?? 0) >= 70 ? 'fill-red' : (c.score ?? 0) >= 50 ? 'fill-yellow' : 'fill-muted';
    const tierBadge  = c.tier === 'High' ? 'badge-red' : c.tier === 'Mid' ? 'badge-yellow' : 'badge-muted';
    const recBadge   = c.rec  === 'Engage' ? (c.tier === 'High' ? 'badge-red' : 'badge-yellow') : 'badge-muted';
    const growthCls  = c.growth > 0 ? 'growth-pos' : c.growth < 0 ? 'growth-neg' : 'growth-neu';
    const growthStr  = c.growth > 0 ? `+${c.growth}%` : `${c.growth}%`;
    const rankEl     = isDisq ? `<span class="rank">—</span>` : rank <= 2 ? `<span class="rank top">${rank}</span>` : `<span class="rank">${rank}</span>`;
    const ix = _lastIx[name];  // undefined=pending, false=no data, object=has data
    const ixCell = ix === undefined
      ? `<span class="spinner-sm" style="opacity:0.3"></span>`
      : ix
        ? `<div class="ix-date">${fmtShort(ix.date)}</div><div class="ix-person">${esc(ix.person)}</div>`
        : `<span style="color:var(--muted);font-size:11px">—</span>`;
    return `<tr${isDisq ? ' class="disqualified"' : ''} onclick="openMapa('${name.replace(/'/g,"\\'")}',event)">
      <td class="center">${rankEl}</td>
      <td>
        <div class="company-name"><a href="https://www.linkedin.com/company/${c.liSlug}/" target="_blank" onclick="event.stopPropagation()">${esc(name)}</a></div>
        <div class="company-meta">${esc(c.segment)}</div>
      </td>
      <td class="center">${c.ftes.toLocaleString('en')}</td>
      <td class="center"><span class="${growthCls}">${growthStr}</span></td>
      <td>${isDisq
        ? '<div class="score-wrap"><span class="score-num" style="color:var(--muted)">—</span></div>'
        : `<div class="score-wrap"><span class="score-num" style="color:${scoreColor}">${c.score}</span><div class="score-bar-bg"><div class="score-bar-fill ${fillCls}" style="width:${c.score}%"></div></div></div>`
      }</td>
      <td><span class="badge ${isDisq ? 'badge-muted' : tierBadge}">${esc(c.tier)}</span></td>
      <td>${ixCell}</td>
      <td class="center">${isDisq
        ? `<span class="disq-reason">${esc(c.disq)}</span>`
        : `<span class="badge ${recBadge}">${esc(c.rec)}</span>`
      }</td>
    </tr>`;
  }).join('');

  // Update sort indicators
  document.querySelectorAll('.th-sort').forEach(th => {
    th.classList.remove('asc', 'desc');
    if (th.dataset.col === _sortCol) th.classList.add(_sortDir);
  });
}

// Populate last interaction from Attio on page load
function computeLastIx() {
  for (const [name, c] of Object.entries(COMPANIES)) {
    if (c.disq) continue;
    const recId = _coByLi?.[c.liSlug] || _coByName?.[name.toLowerCase()];
    if (!recId) { _lastIx[name] = false; continue; }
    const people = _pByCoId?.[recId] || [];
    let best = null;
    for (const p of people) {
      if (!p.last_meeting_date) continue;
      if (!best || p.last_meeting_date > best.last_meeting_date) best = p;
    }
    _lastIx[name] = best ? { date: best.last_meeting_date, person: best.name || '?' } : false;
  }
}

  Object.keys(_ffCache).forEach(k => delete _ffCache[k]);

function normLi(url) {

}

function aVal(arr, kind='value') {

function inferRole(title) {
  if (!title) return 'Usuário';
  const t = title.toLowerCase();
  const cxo = ['ceo','cto','cfo','coo','chro'];
  if (cxo.some(kw => new RegExp('(?<![a-z])' + kw + '(?![a-z])').test(t))) return 'Decisor';
  if (['chief','president','founder','co-founder','co founder','owner','sócio','sócia','presidente','fundador'].some(kw => t.includes(kw))) return 'Decisor';
  if ([' vp ',' vp','vp ','vice president','svp','evp'].some(kw => t.includes(kw))) return 'Influenciador';
  if (['director','diretor','diretora','head of'].some(kw => t.includes(kw)) || /\bhead\b/.test(t)) return 'Influenciador';
  return 'Usuário';
}
function seniorityN(title) {
  if (!title) return 4;
  const t = title.toLowerCase();
  const cxo = ['ceo','cto','cfo','coo','chro'];
  if (cxo.some(kw => new RegExp('(?<![a-z])' + kw + '(?![a-z])').test(t))) return 0;
  if (['chief','president','founder','co-founder','owner'].some(kw => t.includes(kw))) return 0;
  if (/\bvp\b/.test(t) || ['vice president','svp'].some(kw => t.includes(kw))) return 1;
  if (['director','diretor','head of'].some(kw => t.includes(kw)) || /\bhead\b/.test(t)) return 2;
  if (['manager','gerente',' lead','senior'].some(kw => t.includes(kw))) return 3;
  return 4;
}

          const lmeet  = aInteraction(vals?.last_calendar_interaction);
          const lemail = aInteraction(vals?.last_email_interaction);
          const person = {
            id:         p.id.record_id,
            name:       pName(vals),
            job_title:  title,
            linkedin:   liUrl,
            role:       inferRole(title),
            seniority:  seniorityN(title),
            outbound_status:   aVal(vals?.outbound_status, 'status'),
            person_engagement: aVal(vals?.person_engagement, 'status'),
            touchpoint_count:  aVal(vals?.touchpoint_count),
            last_touchpoint_date: aVal(vals?.last_touchpoint_date),
            first_interaction_date: fi?.date,
            first_interaction_type: fi?.type,
            last_interaction_date: li2?.date,
            last_interaction_type: li2?.type,
            last_meeting_date: lmeet?.date,
            last_email_date:   lemail?.date,
          };
          if (!_pByCoId[coId]) _pByCoId[coId] = [];
          _pByCoId[coId].push(person);
        }
        if (d.next_cursor) { off = d.next_cursor; continue; }
        if ((d.data||[]).length < 500) break;
        off += 500;
      } catch(e) { console.error('people fetch:', e); break; }
    }

    // 3. Fetch ALL deals
    _dByCoId = {};
    try {
      const r = await attioPost('/objects/deals/records/query', { limit:500 });
      if (r.ok) {
        const d = await r.json();
        for (const deal of d.data || []) {
          // Try multiple possible field names for the company reference
          const coList = deal.values?.associated_company
            || deal.values?.associated_company_5
            || deal.values?.associated_company_2
            || deal.values?.company
            || deal.values?.client
            || [];
          const coA    = coList.find(v => v.active_until == null);
          const coId   = coA?.target_record_id;
          if (!coId) continue;

          const valList = deal.values?.value || deal.values?.deal_value || [];
          const valA    = valList.find(v => v.active_until == null);

          const bdrList = deal.values?.bdr_associated || deal.values?.owner || [];
          const bdrA    = bdrList.find(v => v.active_until == null);
          const bdr     = bdrA ? (bdrA.option?.title || bdrA.name || bdrA.full_name || bdrA.referenced_actor_name || null) : null;

          const obj = {
            id:           deal.id.record_id,
            name:         aVal(deal.values?.name),
            stage:        aVal(deal.values?.stage),
            value_amount: valA?.amount || valA?.value || null,
            value_currency: valA?.currency_code || null,
            bdr,
            deal_source:  aValSelect(deal.values?.deal_source),
            date_mql:     aVal(deal.values?.date_mql)?.slice(0,10) || null,
            date_sal:     aVal(deal.values?.date_sal)?.slice(0,10) || null,
            date_won:     aVal(deal.values?.date_won)?.slice(0,10) || null,
            date_lost:    aVal(deal.values?.date_lost)?.slice(0,10) || null,
            lost_reason:  aVal(deal.values?.lost_reason),
          };
          if (!_dByCoId[coId]) _dByCoId[coId] = [];
          _dByCoId[coId].push(obj);
        }
      }
    } catch(e) { console.error('deals fetch:', e); }

    // Persist everything to localStorage
    try {
      localStorage.setItem(ATTIO_STORE_KEY, JSON.stringify({
        coByLi: _coByLi, coByName: _coByName, coById: _coById,
        pByCoId: _pByCoId, dByCoId: _dByCoId,
      }));
    } catch(e) { console.warn('Could not save Attio cache:', e); }
  })();

  await _fetchP;
}

// Fireflies per-company cache — baked SD first, then localStorage
const _ffCache = (() => {
  const base = SD?.ff ? { ...SD.ff } : {};
  try { Object.assign(base, JSON.parse(localStorage.getItem(FF_STORE_KEY) || '{}')); } catch {}
  return base;
})();
async function fetchFireflies(companyName) {
  if (_ffCache[companyName] !== undefined) return _ffCache[companyName];
  try {
    const r = await fetch(FIREFLIES_GQL, {
      method:'POST',
      headers:{ 'Authorization':`Bearer ${FIREFLIES_KEY}`, 'Content-Type':'application/json' },
      body: JSON.stringify({
        query:`query SearchTranscripts($title:String){transcripts(title:$title){id title date duration host_email meeting_attendees{displayName email}}}`,
        variables:{ title: companyName },
      }),
    });
    if (!r.ok) { _ffCache[companyName] = []; return []; }
    const d = await r.json();
    const raw = (d.data?.transcripts || []);
    const meetings = raw.map(t => ({
      id:    t.id,
      title: t.title,
      date:  typeof t.date === 'number' ? new Date(t.date).toISOString().slice(0,10) : (t.date || null),
      duration_min: t.duration ? Math.round(t.duration / 60) : null,
      host_email: t.host_email,
      attendees: (t.meeting_attendees || []).map(a => ({ name: a.displayName, email: a.email })),
    })).sort((a,b) => (b.date||'').localeCompare(a.date||''));
    _ffCache[companyName] = meetings;
    try { localStorage.setItem(FF_STORE_KEY, JSON.stringify(_ffCache)); } catch {}
    return meetings;
  } catch(e) { _ffCache[companyName] = []; return []; }
}

   LOAD
══════════════════════════════════════════════════════════════ */
async function loadMapa(name, c) {
  try {
    // Attio data first (blocks on first load, instant after)
    await ensureAttioData();
    if (currentName !== name) return;

    // Resolve company record_id
    const slug = c.liSlug;
    let recordId = _coByLi[slug];
    if (!recordId) recordId = _coByName[name.toLowerCase()];

    currentPeople = recordId ? (_pByCoId[recordId] || []) : [];
    currentDeals  = recordId ? (_dByCoId[recordId] || []) : [];

    // Update Attio link
    if (recordId) {
      document.getElementById('panel-links').innerHTML = `
        <a href="https://www.linkedin.com/company/${slug}/" target="_blank" class="panel-link">↗ LinkedIn</a>
        <a href="https://app.attio.com/comp-tech/company/${recordId}/overview" target="_blank" class="panel-link">↗ Attio</a>`;
    }

    // Render canvas (sync) and panel body
    renderCanvas(name, c, currentPeople);
    renderPanelBody();

    // Fireflies async (don't block)
    fetchFireflies(name).then(ff => {
      if (currentName !== name) return;
      currentFF = ff;
      renderPanelBody();
      // Auto-generate briefing if not cached (fires after FF so context is complete)
      if (!_briefCache[name]) generateBriefing(name);
    });

  } catch(err) {
    console.error('loadMapa:', err);
    if (currentName !== name) return;
    document.getElementById('canvas-state').style.display = 'block';
    document.getElementById('canvas-state').innerHTML =
      `<p>Could not load Attio data</p><small style="color:#bbb">${err.message}</small>`;
    document.getElementById('panel-body').innerHTML =
      `<div class="panel-loading" style="color:var(--accent)">Error loading data: ${esc(err.message)}</div>`;
  }
}

/* ══════════════════════════════════════════════════════════════
   CANVAS RENDER
══════════════════════════════════════════════════════════════ */
const CO_W = 220, CO_H = 100;
const P_W  = 172, P_H  = 90;
const ROW_GAP = 56;   // gap between company bottom and first person row
const P_GAP_H = 16;   // horizontal gap between person nodes
const ROW_STEP = 110; // vertical spacing between person rows

function renderCanvas(name, c, people) {
  const inner   = document.getElementById('mapa-inner');
  const svg     = document.getElementById('mapa-svg');
  const viewport = document.getElementById('mapa-viewport');
  const vw = viewport.offsetWidth  || 800;
  const vh = viewport.offsetHeight || 600;

  // Company node
  const coX = vw / 2;  // center X (used with transform:translateX(-50%))
  const coY = 50;

  const coNode = document.createElement('div');
  coNode.className = 'org-co-node';
  coNode.id = 'org-co-node';
  coNode.style.left = coX + 'px';
  coNode.style.top  = coY + 'px';
  const tierBadge = c.score != null
    ? `<span class="org-co-badge co-badge-score">Score ${c.score}</span>`
    : `<span class="org-co-badge co-badge-fte">Not ICP</span>`;
  coNode.innerHTML = `
    <div class="org-co-name">${esc(name)}</div>
    <div class="org-co-badges">
      ${tierBadge}
      <span class="org-co-badge co-badge-fte">${c.ftes.toLocaleString('en')} FTEs</span>
      <span class="org-co-badge co-badge-li" id="co-li-badge">LinkedIn ↗</span>
    </div>`;
  inner.appendChild(coNode);
  inner.querySelector('#co-li-badge').addEventListener('click', e => {
    e.stopPropagation();
    window.open(`https://www.linkedin.com/company/${c.liSlug}/`, '_blank');
  });

  // Hide canvas-state once company node is added
  document.getElementById('canvas-state').style.display = 'none';

  if (!people || people.length === 0) {
    document.getElementById('canvas-state').style.display = 'block';
    document.getElementById('canvas-state').innerHTML =
      `<p style="font-size:12px;color:#9CA3AF">No contacts found in Attio for this company.</p>`;
    // Still size SVG
    svg.setAttribute('width', vw); svg.setAttribute('height', vh);
    fitView(); return;
  }

  // Sort by seniority
  const sorted = [...people].sort((a,b) => a.seniority - b.seniority);

  // Group into tiers, max 4 per row
  const tiers = {};
  sorted.forEach(p => {
    const t = Math.min(p.seniority, 4);
    if (!tiers[t]) tiers[t] = [];
    tiers[t].push(p);
  });

  const pNodes = [];
  let rowY = coY + CO_H + ROW_GAP;

  for (const tierKey of Object.keys(tiers).sort((a,b)=>+a-+b)) {
    const tierPeople = tiers[tierKey];
    const chunks = [];
    for (let i = 0; i < tierPeople.length; i += 4) chunks.push(tierPeople.slice(i, i+4));

    for (const chunk of chunks) {
      const totalW = chunk.length * P_W + (chunk.length - 1) * P_GAP_H;
      const startX = coX - totalW / 2 + P_W / 2;

      chunk.forEach((person, i) => {
        const px = startX + i * (P_W + P_GAP_H);
        const py = rowY;

        const pNode = document.createElement('div');
        pNode.className = 'org-person-node';
        pNode.style.left = px + 'px';
        pNode.style.top  = py + 'px';
        const roleCls = person.role === 'Decisor' ? 'role-d' : person.role === 'Influenciador' ? 'role-i' : 'role-u';
        pNode.innerHTML = `
          <div class="org-pname-row">
            <div class="org-pname">${esc(person.name || '—')}</div>
            ${person.linkedin ? `<a href="${esc(person.linkedin)}" target="_blank" class="org-pli" onclick="event.stopPropagation()" title="LinkedIn">↗</a>` : ''}
          </div>
          ${person.job_title ? `<div class="org-ptitle">${esc(person.job_title)}</div>` : ''}
          <span class="org-prole ${roleCls}">${person.role}</span>
          ${person.last_meeting_date ? `<div class="org-pdate">📅 ${fmtShort(person.last_meeting_date)}</div>` : ''}`;
        inner.appendChild(pNode);
        pNodes.push({ el: pNode, cx: px, ty: py });
      });

      rowY += P_H + ROW_STEP;
    }
  }

  // SVG size = content bounding box
  const contentW = Math.max(vw, coX + CO_W / 2 + 40);
  const contentH = rowY + 20;
  svg.setAttribute('width',  contentW);
  svg.setAttribute('height', contentH);

  requestAnimationFrame(() => {
    drawLines(svg, coNode, pNodes);
    fitView();
  });
}

function drawLines(svg, coNode, pNodes) {
  const coL = parseFloat(coNode.style.left);  // this is the center X (because translateX(-50%))
  const coT = parseFloat(coNode.style.top);
  const coW = coNode.offsetWidth;
  const coH = coNode.offsetHeight;
  const coCX = coL;  // style.left IS the center (due to transform)
  const coBY = coT + coH;

  if (!pNodes.length) return;
  const stroke = 'stroke="#D1D5DB" stroke-width="1.5" fill="none" stroke-linecap="round"';
  let paths = '';

  const rects = pNodes.map(n => ({
    cx: parseFloat(n.el.style.left),  // also center due to translateX
    ty: parseFloat(n.el.style.top),
    bY: parseFloat(n.el.style.top) + (n.el.offsetHeight || P_H),
  }));

  if (pNodes.length === 1) {
    const mY = (coBY + rects[0].ty) / 2;
    paths += `<path d="M${coCX},${coBY} C${coCX},${mY} ${rects[0].cx},${mY} ${rects[0].cx},${rects[0].ty}" ${stroke}/>`;
  } else {
    const brY = rects[0].ty - 20;
    const minX = Math.min(...rects.map(r=>r.cx));
    const maxX = Math.max(...rects.map(r=>r.cx));
    paths += `<line x1="${coCX}" y1="${coBY}" x2="${coCX}" y2="${brY}" ${stroke}/>`;
    if (minX !== maxX) paths += `<line x1="${minX}" y1="${brY}" x2="${maxX}" y2="${brY}" ${stroke}/>`;
    rects.forEach(r => { paths += `<line x1="${r.cx}" y1="${brY}" x2="${r.cx}" y2="${r.ty}" ${stroke}/>`; });
  }
  svg.innerHTML = paths;
}

/* ══════════════════════════════════════════════════════════════
   PAN / ZOOM
══════════════════════════════════════════════════════════════ */
let _scale = 1, _tx = 0, _ty = 0;
let _drag = false, _dragSX = 0, _dragSY = 0, _dragTX = 0, _dragTY = 0;

function applyTransform() {
  document.getElementById('mapa-inner').style.transform =
    `translate(${_tx}px,${_ty}px) scale(${_scale})`;
}

function resetZoom() { _scale = 1; _tx = 0; _ty = 0; applyTransform(); }

function zoomAt(mx, my, factor) {
  _scale = Math.max(0.15, Math.min(4, _scale * factor));
  _tx = mx - (mx - _tx) * factor;
  _ty = my - (my - _ty) * factor;
  // clamp to reasonable bounds
  _scale = Math.max(0.15, Math.min(4, _scale));
  applyTransform();
}

function zoomIn()  { const vp = document.getElementById('mapa-viewport'); zoomAt(vp.offsetWidth/2, vp.offsetHeight/2, 1.25); }
function zoomOut() { const vp = document.getElementById('mapa-viewport'); zoomAt(vp.offsetWidth/2, vp.offsetHeight/2, 0.8); }

function fitView() {
  const vp    = document.getElementById('mapa-viewport');
  const inner = document.getElementById('mapa-inner');
  const vw = vp.offsetWidth, vh = vp.offsetHeight;

  // Collect all node elements
  const nodes = inner.querySelectorAll('.org-co-node, .org-person-node');
  if (!nodes.length) { resetZoom(); return; }

  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  nodes.forEach(n => {
    const cx = parseFloat(n.style.left);
    const y  = parseFloat(n.style.top);
    const w  = n.offsetWidth  || (n.classList.contains('org-co-node') ? CO_W : P_W);
    const h  = n.offsetHeight || (n.classList.contains('org-co-node') ? CO_H : P_H);
    minX = Math.min(minX, cx - w/2);
    maxX = Math.max(maxX, cx + w/2);
    minY = Math.min(minY, y);
    maxY = Math.max(maxY, y + h);
  });

  const pad = 48;
  const bw = maxX - minX + pad*2;
  const bh = maxY - minY + pad*2;
  const scale = Math.min(1.2, Math.min((vw) / bw, (vh) / bh));

  _scale = scale;
  _tx = (vw - (maxX + minX) * scale) / 2;
  _ty = (vh - (maxY + minY) * scale) / 2;
  applyTransform();
}

// Viewport pan/zoom events
(function() {
  const vp = document.getElementById('mapa-viewport');
  const canvas = document.getElementById('mapa-canvas');

  vp.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = vp.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    zoomAt(mx, my, e.deltaY > 0 ? 0.9 : 1.1);
  }, { passive: false });

  vp.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    _drag = true; _dragSX = e.clientX; _dragSY = e.clientY;
    _dragTX = _tx; _dragTY = _ty;
    canvas.classList.add('dragging');
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!_drag) return;
    _tx = _dragTX + (e.clientX - _dragSX);
    _ty = _dragTY + (e.clientY - _dragSY);
    applyTransform();
  });

  document.addEventListener('mouseup', () => {
    if (_drag) { _drag = false; canvas.classList.remove('dragging'); }
  });
})();

function renderPanelBody() {

const BRIEFING_SECTIONS = [
  { key:'resumo_executivo',    label:'Resumo Executivo' },
  { key:'momento_de_negocio',  label:'Momento de Negócio' },
  { key:'estrutura_hr',        label:'Estrutura de RH' },
  { key:'dores_e_desafios',    label:'Dores e Desafios' },
  { key:'operacao_hr',         label:'Operação de RH' },
  { key:'mapa_relacionamento', label:'Mapa de Relacionamento' },
  { key:'objecoes_bloqueios',  label:'Objeções / Bloqueios' },
  { key:'proximo_passo',       label:'Próximo Passo' },
];

function renderBriefingHtml(name) {
  const b = _briefCache[name];
  const ts = b?.generated_at ? `Gerado ${fmtShort(b.generated_at)}` : '';

  if (b === 'loading') {
    return `<div class="briefing-bar">
      <span style="font-size:11px;color:var(--muted)"><span class="spinner-sm"></span>Gerando briefing com Claude…</span>
    </div>`;
  }

  if (!b) {
    return `<div class="briefing-bar">
      <span style="font-size:11px;color:var(--muted)"><span class="spinner-sm"></span>Aguardando dados para gerar briefing…</span>
    </div>`;
  }

  if (b._error) {
    return `<div class="briefing-bar">
      <span style="font-size:11px;color:var(--muted)">🧠 Inteligência de Conta</span>
      <button class="briefing-btn refresh" onclick="generateBriefing('${name.replace(/'/g,"\\'")}')">↺ Tentar novamente</button>
    </div><p style="font-size:11px;color:var(--accent);margin-bottom:12px">Erro: ${esc(b._error)}</p>`;
  }

  // Has briefing
  let sections = '';
  for (const s of BRIEFING_SECTIONS) {
    const val = b[s.key];
    if (!val) continue;
    // Render **bold** markdown inline
    const rendered = esc(val).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    sections += `<div class="briefing-section">
      <div class="briefing-section-label">${s.label}</div>
      <div class="briefing-text">${rendered}</div>
    </div>`;
  }

  return `<div class="briefing-bar">
    <span style="font-size:11px;font-weight:700;color:var(--indigo)">🧠 Inteligência de Conta</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="briefing-ts">${ts}</span>
      <button class="briefing-btn refresh" onclick="generateBriefing('${name.replace(/'/g,"\\'")}')">↺ Atualizar</button>
    </div>
  </div>
  <div class="briefing-panel">${sections}</div>`;
}

function renderOverview(c, people, deals, ff) {

  // Briefing bar (always shown at top)
  html += renderBriefingHtml(currentName);

  // Score breakdown
  if (c.score != null) {
    html += `<div class="panel-section">
      <div class="psection-title">ICP Score Breakdown</div>
      <div class="score-breakdown">
        <div class="score-row">
          <span class="score-row-label">Pain / Budget</span>
          <div class="score-row-bar-bg"><div class="score-row-bar-fill" style="width:${(c.pain/40)*100}%"></div></div>
          <span class="score-row-val">${c.pain} / 40</span>
        </div>
        <div class="score-row">
          <span class="score-row-label">Product / Tech</span>
          <div class="score-row-bar-bg"><div class="score-row-bar-fill" style="width:${(c.tech/28)*100}%"></div></div>
          <span class="score-row-val">${c.tech} / 28</span>
        </div>
        <div class="score-row">
          <span class="score-row-label">Willingness</span>
          <div class="score-row-bar-bg"><div class="score-row-bar-fill" style="width:${(c.will/26)*100}%"></div></div>
          <span class="score-row-val">${c.will} / 26</span>
        </div>
      </div>
    </div>`;
  }

  // Pipeline / Deals
  if (deals.length > 0) {
    html += `<div class="panel-section"><div class="psection-title">Pipeline (${deals.length})</div>`;
    for (const d of deals) {
      const isWon  = !!d.date_won;
      const isLost = !!d.date_lost;
      const cardCls = isWon ? 'deal-card won' : isLost ? 'deal-card lost' : 'deal-card';
      const stageCls = isWon ? 'deal-stage-won' : isLost ? 'deal-stage-lost' : 'deal-stage-active';
      html += `<div class="${cardCls}">
        <div class="deal-card-row">
          <div class="deal-name">${esc(d.name || '—')}</div>
          ${d.stage ? `<span class="deal-stage ${stageCls}">${esc(d.stage)}</span>` : ''}
        </div>
        <div class="deal-dates">
          ${d.date_mql  ? `<span class="dl"><b>MQL</b> ${fmtShort(d.date_mql)}</span>` : ''}
          ${d.date_sal  ? `<span class="dl"><b>SAL</b> ${fmtShort(d.date_sal)}</span>` : ''}
          ${d.date_won  ? `<span class="dl"><b>Won</b> ${fmtShort(d.date_won)}</span>` : ''}
          ${d.date_lost ? `<span class="dl"><b>Lost</b> ${fmtShort(d.date_lost)}${d.lost_reason ? ` · ${esc(d.lost_reason)}` : ''}</span>` : ''}
          ${d.value_amount != null ? `<span class="dl" style="margin-left:auto"><b>${d.value_currency||''} ${(+d.value_amount).toLocaleString()}</b></span>` : ''}
        </div>
        ${(d.deal_source || d.bdr) ? `<div class="deal-meta">
          ${d.deal_source ? `<span>Source: ${esc(d.deal_source)}</span>` : ''}
          ${d.bdr         ? `<span>BDR: ${esc(d.bdr)}</span>` : ''}
        </div>` : ''}
      </div>`;
    }
    html += '</div>';
  }

  // Pessoas
  const sortedP = [...people].sort((a,b) => a.seniority - b.seniority);
  html += `<div class="panel-section"><div class="psection-title">People · via Attio (${sortedP.length})</div>`;
  if (sortedP.length === 0) {
    html += '<div class="psection-empty">No contacts found in Attio.</div>';
  } else {
    for (const p of sortedP) {
      const roleCls = p.role === 'Decisor' ? 'ptag-d' : p.role === 'Influenciador' ? 'ptag-i' : 'ptag-u';
      html += `<div class="pessoa-card">
        <div class="pessoa-row">
          <div style="min-width:0">
            <div class="pessoa-name">${esc(p.name||'—')}</div>
            ${p.job_title ? `<div class="pessoa-title">${esc(p.job_title)}</div>` : ''}
          </div>
          ${p.linkedin ? `<a href="${esc(p.linkedin)}" target="_blank" class="pessoa-li">↗</a>` : ''}
        </div>
        <div class="pessoa-tags">
          <span class="ptag ${roleCls}">${p.role}</span>
          ${p.outbound_status   ? `<span class="ptag ptag-ob">${esc(p.outbound_status)}</span>`   : ''}
          ${p.person_engagement ? `<span class="ptag ptag-en">${esc(p.person_engagement)}</span>` : ''}
        </div>
        <div class="pessoa-dates">
          ${p.last_meeting_date          ? `<span class="pm">📅 Last meeting: ${fmtDate(p.last_meeting_date)}</span>` : ''}
          ${p.first_interaction_date     ? `<span class="pe">🚀 First contact: ${fmtDate(p.first_interaction_date)}</span>` : ''}
        </div>
      </div>`;
    }
  }
  html += '</div>';

  // Reuniões Fireflies
  if (ff.length > 0) {
    html += `<div class="panel-section"><div class="psection-title">🎙 Reuniões · Fireflies (${ff.length})</div>`;
    for (const m of ff.slice(0,5)) {
      // All attendees combined (Fireflies often has no email domain info)
      const allAtts  = (m.attendees||[]).map(a=>a.name||(a.email?.split('@')[0])||'').filter(Boolean);
      const compP    = (m.attendees||[]).filter(a=>a.email?.includes(COMP_DOMAIN)).map(a=>a.name||a.email?.split('@')[0]||'').filter(Boolean);
      const clientP  = (m.attendees||[]).filter(a=>a.email&&!a.email.includes(COMP_DOMAIN)).map(a=>a.name||a.email?.split('@')[0]||'').filter(Boolean);
      // If no email-domain separation, show all attendees as participants
      const showComp   = compP.length > 0;
      const showClient = clientP.length > 0;
      const showAll    = !showComp && !showClient && allAtts.length > 0;
      html += `<div class="meeting-item">
        <div class="meeting-row">
          <div class="meeting-title">${esc(m.title||'Reunião')}</div>
          <div class="meeting-date">${fmtShort(m.date)}</div>
        </div>
        ${showComp   ? `<div class="meeting-ppl"><span class="comp-name">Comp:</span> ${esc(compP.join(', '))}</div>` : ''}
        ${showClient ? `<div class="meeting-ppl"><span class="client-name">Cliente:</span> ${esc(clientP.join(', '))}</div>` : ''}
        ${showAll    ? `<div class="meeting-ppl"><span style="color:var(--text);font-weight:500">Participantes:</span> ${esc(allAtts.join(', '))}</div>` : ''}
        ${m.duration_min ? `<div class="meeting-dur">${m.duration_min}min</div>` : ''}
      </div>`;
    }
    if (ff.length > 5) html += `<p style="font-size:10px;color:var(--muted);text-align:center">+${ff.length-5} more in Timeline</p>`;
    html += '</div>';
  } else {
    const ffKey = currentName;
    const ffLoading = typeof _ffCache[ffKey] === 'undefined';
    const ffEmpty   = Array.isArray(_ffCache[ffKey]) && _ffCache[ffKey].length === 0;
    if (ffLoading) {
      html += `<div class="panel-section"><div class="psection-title">🎙 Reuniões · Fireflies</div><div class="panel-loading"><span class="spinner-sm"></span>Searching Fireflies…</div></div>`;
    } else if (ffEmpty) {
      html += `<div class="panel-section"><div class="psection-title">🎙 Reuniões · Fireflies</div><div class="psection-empty">No meetings found in Fireflies.</div></div>`;
    }
  }

  return html;
}

function renderTimeline(c, people, deals, ff) {
  // Build events list (mirrors buildTimeline from MapaContas.tsx)
  const events = [];

  // Fireflies meetings
  for (const m of ff) {
    if (!m.date) continue;
    const compP   = (m.attendees||[]).filter(a=>a.email?.includes(COMP_DOMAIN)).map(a=>a.name||'').filter(Boolean);
    const clientP = (m.attendees||[]).filter(a=>a.email&&!a.email.includes(COMP_DOMAIN)).map(a=>a.name||'').filter(Boolean);
    const parts = [];
    if (compP.length)   parts.push(`Comp: ${compP.join(', ')}`);
    if (clientP.length) parts.push(`Cliente: ${clientP.join(', ')}`);
    if (m.duration_min) parts.push(`${m.duration_min}min`);
    events.push({ date: m.date, icon:'🎙', label: m.title||'Reunião', detail: parts.join(' · ')||null, col:'bg-amber-50 text-amber-700' });
  }

  // Deal milestones
  for (const d of deals) {
    const dn = d.name || 'Deal';
    if (d.date_mql)  events.push({ date:d.date_mql,  icon:'MQL', label:'MQL',  detail:dn, col:'bg-indigo-50 text-indigo-700' });
    if (d.date_sal)  events.push({ date:d.date_sal,  icon:'SAL', label:'SAL',  detail:dn, col:'bg-blue-50 text-blue-700' });
    if (d.date_won)  events.push({ date:d.date_won,  icon:'✓',   label:'Won',  detail:dn, col:'bg-green-50 text-green-700' });
    if (d.date_lost) events.push({ date:d.date_lost, icon:'✗',   label:`Lost${d.lost_reason?` — ${d.lost_reason}`:''}`, detail:dn, col:'bg-red-50 text-red-700' });
  }

  // Per-person interactions
  for (const p of people) {
    const pn = p.name || 'Contact';
    if (p.last_meeting_date) events.push({ date:p.last_meeting_date, icon:'📅', label:`Meeting — ${pn}`, detail:p.job_title||null, col:'bg-violet-50 text-violet-700' });
    if (p.last_email_date && p.last_email_date !== p.last_meeting_date)
      events.push({ date:p.last_email_date, icon:'✉', label:`Email — ${pn}`, detail:p.job_title||null, col:'bg-sky-50 text-sky-700' });
    if (p.first_interaction_date)
      events.push({ date:p.first_interaction_date, icon:'🚀', label:`First contact — ${pn}`, detail:p.first_interaction_type||null, col:'bg-orange-50 text-orange-700' });
  }

  // Deduplicate + sort descending
  const seen = new Set();
  const uniq = events.filter(ev => {
    const k = `${ev.date}-${ev.label}`;
    if (seen.has(k)) return false; seen.add(k); return true;
  }).sort((a,b) => (b.date||'').localeCompare(a.date||''));

  if (!uniq.length) {
    return '<div class="psection-empty" style="margin-top:16px">No timeline events available.</div>';
  }

  let html = '<div class="timeline-wrap"><div class="timeline-line"></div>';
  for (const ev of uniq) {
    html += `<div class="tl-item">
      <div class="tl-icon ${ev.col}" style="font-size:${ev.icon.length>1?'9px':'12px'}">${ev.icon}</div>
      <div class="tl-content">
        <div><span class="tl-label">${esc(ev.label)}</span><span class="tl-date">${fmtShort(ev.date)}</span></div>
        ${ev.detail ? `<div class="tl-detail">${esc(ev.detail)}</div>` : ''}
      </div>
    </div>`;
  }
  html += '</div>';
  return html;
}

/* ══════════════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════════════ */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}); }
  catch { return d; }
}
function fmtShort(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}); }
  catch { return d; }
}

// Resize: re-fit when canvas resizes
if (typeof ResizeObserver !== 'undefined') {
  new ResizeObserver(() => {
    if (currentName) setTimeout(fitView, 50);
  }).observe(document.getElementById('mapa-viewport'));
}

/* ══════════════════════════════════════════════════════════════
   BRIEFING — Generate via LiteLLM (same as Hustler backend)
══════════════════════════════════════════════════════════════ */
const BRIEFING_SYSTEM = `Você é um analista de inteligência comercial da Comp (HR-as-a-Service, líder no Brasil).
Sua tarefa: analisar dados de CRM + transcrições de reuniões e gerar um briefing executivo sobre a conta.

Retorne APENAS um JSON válido (sem markdown fence, sem texto fora do JSON) com esta estrutura exata:
{
  "resumo_executivo": "...",
  "momento_de_negocio": "...",
  "estrutura_hr": "...",
  "dores_e_desafios": "...",
  "operacao_hr": "...",
  "mapa_relacionamento": "...",
  "objecoes_bloqueios": "...",
  "proximo_passo": "..."
}

Regras:
- Use bullets com "- " para múltiplos pontos dentro de cada campo
- Use **negrito** para destacar nomes ou termos-chave
- Seja direto e acionável — escreva para um AE que vai entrar em uma reunião amanhã
- Se não houver informação suficiente para um campo, escreva null
- Não invente informações — baseie-se apenas nos dados fornecidos`;

async function generateBriefing(name) {
  if (!name) return;
  const c = COMPANIES[name];
  if (!c) return;

  _briefCache[name] = 'loading';
  _saveBriefings();  // removes stale entry from localStorage immediately
  renderPanelBody();

  // Build context (same structure as graph.py)
  const parts = [];

  // Company info
  parts.push(`## Empresa\n- Nome: ${name}\n- Segmento: ${c.segment}\n- FTEs: ${c.ftes}\n- ICP Score: ${c.score ?? 'N/A'}\n- Tier: ${c.tier}`);

  // People
  if (currentPeople.length) {
    const lines = currentPeople.map(p => {
      let l = `- **${p.name || '?'}** (${p.job_title || '?'}) — ${p.role}`;
      if (p.touchpoint_count) l += ` — ${p.touchpoint_count} touchpoints`;
      if (p.last_meeting_date) l += ` — último meeting: ${p.last_meeting_date}`;
      if (p.first_interaction_date) l += ` — primeiro contato: ${p.first_interaction_date}`;
      return l;
    });
    parts.push(`## Contatos\n${lines.join('\n')}`);
  }

  // Deals
  if (currentDeals.length) {
    const lines = currentDeals.map(d => {
      let l = `- **${d.name || '?'}** | Estágio: ${d.stage || '?'} | BDR: ${d.bdr || '?'}`;
      if (d.date_mql)  l += ` | MQL: ${d.date_mql}`;
      if (d.date_sal)  l += ` | SAL: ${d.date_sal}`;
      if (d.date_won)  l += ` | WON ✓: ${d.date_won}`;
      if (d.date_lost) l += ` | LOST: ${d.date_lost}`;
      if (d.lost_reason) l += ` | Motivo: ${d.lost_reason}`;
      return l;
    });
    parts.push(`## Deals\n${lines.join('\n')}`);
  }

  // Fireflies meetings (metadata only)
  if (currentFF.length) {
    const blocks = currentFF.slice(0, 5).map(m => {
      const atts = (m.attendees || []).map(a => a.name || a.email || '').filter(Boolean);
      return `**${m.title || 'Reunião'}** (${m.date || '?'})\nParticipantes: ${atts.join(', ') || 'N/A'}${m.duration_min ? `\nDuração: ${m.duration_min}min` : ''}`;
    });
    parts.push(`## Reuniões (Fireflies)\n\n${blocks.join('\n\n---\n\n')}`);
  }

  if (!parts.length) {
    _briefCache[name] = null;
    renderPanelBody();
    return;
  }

  const context = parts.join('\n\n');

  try {
    const resp = await fetch(LITELLM_URL, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${LITELLM_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: LITELLM_MODEL,
        max_tokens: 2500,
        messages: [
          { role: 'system', content: BRIEFING_SYSTEM },
          { role: 'user', content: `Gere o briefing para a conta **${name}**:\n\n${context}` },
        ],
      }),
    });
    if (!resp.ok) throw new Error(`LiteLLM ${resp.status}`);
    const data = await resp.json();
    let raw = data.choices?.[0]?.message?.content?.trim() || '';
    // Strip markdown fence if present
    const fenceMatch = raw.match(/```(?:json)?\s*(\{[\s\S]*?\})\s*```/);
    if (fenceMatch) raw = fenceMatch[1];
    try {
      const briefing = JSON.parse(raw);
      briefing.generated_at = new Date().toISOString();
      _briefCache[name] = briefing;
    } catch {
      _briefCache[name] = { resumo_executivo: raw, generated_at: new Date().toISOString() };
    }
    _saveBriefings();
  } catch(err) {
    console.error('briefing error:', err);
    _briefCache[name] = { _error: err.message };
  }

  if (currentName === name) renderPanelBody();
}

// ── Boot ──
if (SD?.generated_at) {
  setRefreshStatus('Dados de ' + fmtShort(SD.generated_at));
}
renderTable();
loadLastInteractions();
